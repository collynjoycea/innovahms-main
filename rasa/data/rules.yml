version: "3.1"

rules:
  - rule: greet user
    steps:
      - intent: greet
      - action: utter_greet

  - rule: say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: room availability
    steps:
      - intent: ask_room_availability
      - action: action_check_room_availability
      - action: action_capture_guest_preferences

  - rule: amenities
    steps:
      - intent: ask_amenities
      - action: action_get_amenities

  - rule: checkin checkout
    steps:
      - intent: ask_checkin_checkout
      - action: action_get_checkin_checkout_info

  - rule: reservation assistance
    steps:
      - intent: request_booking_help
      - action: action_reservation_assistance
      - action: action_capture_guest_preferences

  - rule: digital key
    steps:
      - intent: ask_digital_key
      - action: action_get_digital_key_status

  - rule: loyalty summary
    steps:
      - intent: ask_loyalty_points
      - action: action_get_loyalty_summary

  - rule: modify booking
    steps:
      - intent: modify_booking
      - action: action_get_booking_policy

  - rule: cancel booking
    steps:
      - intent: cancel_booking
      - action: action_get_booking_policy

  - rule: fallback
    steps:
      - intent: out_of_scope
      - action: utter_out_of_scope
